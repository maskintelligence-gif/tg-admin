name: Generate Keystore

on:
  workflow_dispatch:
    inputs:
      key_password:
        description: 'Chamber22@'
        required: true
        type: string
      org_name:
        description: 'MASK INTELLIGENCE'
        required: true
        default: 'TooroGadgets'
        type: string

jobs:
  generate-keystore:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore tg-admin-release.keystore \
            -alias tg-admin \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ inputs.key_password }}" \
            -keypass "${{ inputs.key_password }}" \
            -dname "CN=${{ inputs.org_name }}, OU=Admin, O=${{ inputs.org_name }}, L=Fort Portal, S=Western, C=UG"

      - name: Print base64 keystore
        run: |
          echo "================================================================"
          echo "COPY EVERYTHING BETWEEN THE LINES BELOW AS YOUR KEYSTORE_BASE64 SECRET:"
          echo "================================================================"
          base64 -w 0 tg-admin-release.keystore
          echo ""
          echo "================================================================"
          echo "✅ Done! Now add these GitHub Secrets:"
          echo "  KEYSTORE_BASE64   = the base64 string above"
          echo "  KEYSTORE_PASSWORD = ${{ inputs.key_password }}"
          echo "  KEY_ALIAS         = tg-admin"
          echo "  KEY_PASSWORD      = ${{ inputs.key_password }}"
          echo "================================================================"
