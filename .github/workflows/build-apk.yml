name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Java (required for Gradle / Android build) ────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Setup Node.js ───────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 5. Build Vite app (outputs to dist/) ──────────────────────────────
      - name: Build web app
        run: npm run build
        env:
          VITE_BASE_URL: /

      # ── 6. Install Capacitor CLI + Android platform ────────────────────────
      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      # ── 7. Add Android platform (initializes android/ folder) ─────────────
      - name: Add Android platform
        run: npx cap add android

      # ── 8. Sync web build into Android project ─────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 9. Set up Android SDK ──────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 10. Make Gradle wrapper executable ────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 11. Build debug APK ────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── 12. Upload APK as downloadable artifact ────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tg-admin-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30 # artifact stays downloadable for 30 days

      # ── 13. Show APK size in logs ──────────────────────────────────────────
      - name: Print APK info
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          echo "✅ APK built successfully"
          echo "📦 Size: $(du -sh $APK | cut -f1)"
          echo "📥 Download from the Actions tab → this workflow run → Artifacts"
