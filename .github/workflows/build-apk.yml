name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Java ──────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Setup Node.js ───────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 5. Build Vite app ─────────────────────────────────────────────────
      - name: Build web app
        run: npm run build
        env:
          VITE_BASE_URL: /
          VITE_NOTIFICATION_SERVER_URL: ${{ secrets.VITE_NOTIFICATION_SERVER_URL }}
          VITE_WEBHOOK_SECRET: ${{ secrets.VITE_WEBHOOK_SECRET }}

      # ── 6. Add Android platform ───────────────────────────────────────────
      - name: Add Android platform
        run: npx cap add android

      # ── 7. Inject google-services.json (required for FCM) ─────────────────
      - name: Inject google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
          echo "✅ google-services.json injected"

      # ── 8. Sync Capacitor ─────────────────────────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 9. Make Gradle wrapper executable ────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 10. Build debug APK ───────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── 11. Upload APK artifact ───────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tg-admin-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 12. Print APK info ────────────────────────────────────────────────
      - name: Print APK info
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          echo "✅ APK built successfully"
          echo "📦 Size: $(du -sh $APK | cut -f1)"
          echo "📥 Download from Actions → this run → Artifacts"
